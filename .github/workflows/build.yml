name: Build & Release

on:
  push:
    tags:
      - 'v*'   # triggers on: git tag v1.0.0 && git push --tags

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Build exe
        run: pyinstaller optimizer.spec --clean --noconfirm

      - name: Create GitHub Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PC-Optimizer.exe
          generate_release_notes: true
